name: Release Smoke

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to smoke test
        required: false
        default: v0.2.0
  schedule:
    - cron: "37 3 * * 1"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || 'v0.2.0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Smoke test release asset
        run: npm run smoke:release
