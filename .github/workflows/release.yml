name: Release

env:
  ZIG_VERSION: 0.15.2

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view ${{ github.ref_name }} --repo ${{ github.repository }} >/dev/null 2>&1 || \
            gh release create ${{ github.ref_name }} \
              --repo ${{ github.repository }} \
              --title "${{ github.ref_name }}" \
              --notes "Initial bocdump release."

  release:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            artifact: bocdump-x86_64-linux
          - target: aarch64-linux
            artifact: bocdump-aarch64-linux
          - target: x86_64-macos
            artifact: bocdump-x86_64-macos
          - target: aarch64-macos
            artifact: bocdump-aarch64-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        run: |
          set -euo pipefail
          zig_dir="zig-x86_64-linux-${ZIG_VERSION}"
          curl -fsSLo zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/${zig_dir}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/${zig_dir}" >> "$GITHUB_PATH"
          "$PWD/${zig_dir}/zig" version

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp zig-out/bin/bocdump dist/${{ matrix.artifact }}/
          cp README.md LICENSE dist/${{ matrix.artifact }}/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} ${{ matrix.artifact }}.tar.gz --clobber

  checksums:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern "bocdump-*.tar.gz" --dir dist

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum bocdump-*.tar.gz > SHA256SUMS

      - name: Upload SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} dist/SHA256SUMS --clobber
