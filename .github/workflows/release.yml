name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view ${{ github.ref_name }} --repo ${{ github.repository }} >/dev/null 2>&1 || \
            gh release create ${{ github.ref_name }} \
              --repo ${{ github.repository }} \
              --title "${{ github.ref_name }}" \
              --notes "Initial bocdump release."

  release:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            artifact: bocdump-x86_64-linux
          - target: aarch64-linux
            artifact: bocdump-aarch64-linux
          - target: x86_64-macos
            artifact: bocdump-x86_64-macos
          - target: aarch64-macos
            artifact: bocdump-aarch64-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp zig-out/bin/bocdump dist/${{ matrix.artifact }}/
          cp README.md LICENSE dist/${{ matrix.artifact }}/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} ${{ matrix.artifact }}.tar.gz --clobber
