name: CI

env:
  ZIG_VERSION: 0.15.2

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        run: |
          set -euo pipefail
          zig_dir="zig-x86_64-linux-${ZIG_VERSION}"
          curl -fsSLo zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/${zig_dir}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/${zig_dir}" >> "$GITHUB_PATH"
          "$PWD/${zig_dir}/zig" version

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install fixture dependencies
        run: npm ci

      - name: Check formatting
        run: zig fmt --check build.zig src/main.zig

      - name: Run Zig tests
        run: zig build test

      - name: Build ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe

      - name: Verify fixtures
        run: npm run verify:fixtures

      - name: Fuzz BoC parser
        run: npm run fuzz
