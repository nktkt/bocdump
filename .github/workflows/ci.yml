name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install fixture dependencies
        run: npm ci

      - name: Check formatting
        run: zig fmt --check build.zig src/main.zig

      - name: Run Zig tests
        run: zig build test

      - name: Build ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe

      - name: Verify fixtures
        run: npm run verify:fixtures
